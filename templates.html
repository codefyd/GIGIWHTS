<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>القوالب | لوحة واتساب أعمال</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand app-brand" href="dashboard.html">لوحة واتساب أعمال</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav me-auto sidebar-links">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="contacts.html">جهات الاتصال</a></li>
          <li class="nav-item"><a class="nav-link" href="conversations.html">المحادثات</a></li>
          <li class="nav-item"><a class="nav-link active" href="templates.html">القوالب</a></li>
          <li class="nav-item"><a class="nav-link" href="webhook-logs.html">Webhook Logs</a></li>
          <li class="nav-item"><a class="nav-link" href="settings.html">الإعدادات</a></li>
        </ul>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">خروج</button>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="page-card mb-4">
        <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
          <div>
            <h1 class="page-title">قوالب واتساب</h1>
            <p class="page-subtitle">استعراض ومزامنة القوالب من Meta</p>
          </div>
          <button class="btn btn-success" id="syncTemplatesBtn">
            <i class="fa-solid fa-rotate ms-1"></i>
            مزامنة القوالب
          </button>
        </div>
      </div>

      <div class="toolbar-card mb-3">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label fw-bold">بحث</label>
            <input type="text" id="searchInput" class="form-control" placeholder="اسم القالب">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-bold">الحالة</label>
            <input type="text" id="statusInput" class="form-control" placeholder="approved / pending">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-bold">اللغة</label>
            <input type="text" id="languageInput" class="form-control" placeholder="ar">
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100" id="searchBtn">تطبيق</button>
          </div>
        </div>
      </div>

      <div class="table-card">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>الاسم</th>
                <th>اللغة</th>
                <th>التصنيف</th>
                <th>الحالة</th>
                <th>آخر مزامنة</th>
              </tr>
            </thead>
            <tbody id="templatesTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="guards.js"></script>
  <script src="templates-page.js"></script>
</body>
</html>
