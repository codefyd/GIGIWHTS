<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإعدادات | لوحة واتساب أعمال</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand app-brand" href="dashboard.html">لوحة واتساب أعمال</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav me-auto sidebar-links">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="contacts.html">جهات الاتصال</a></li>
          <li class="nav-item"><a class="nav-link" href="conversations.html">المحادثات</a></li>
          <li class="nav-item"><a class="nav-link" href="templates.html">القوالب</a></li>
          <li class="nav-item"><a class="nav-link" href="webhook-logs.html">Webhook Logs</a></li>
          <li class="nav-item"><a class="nav-link active" href="settings.html">الإعدادات</a></li>
        </ul>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">خروج</button>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="page-card mb-4">
        <h1 class="page-title">إعدادات النظام</h1>
        <p class="page-subtitle">أرقام واتساب، الحسابات، والإعدادات العامة</p>
      </div>

      <div class="settings-grid">
        <div class="page-card">
          <div class="section-title">حسابات واتساب</div>
          <div id="accountsWrap"></div>
        </div>

        <div class="page-card">
          <div class="section-title">الأرقام المرتبطة</div>
          <div id="phoneNumbersWrap"></div>
        </div>

        <div class="page-card">
          <div class="section-title">الإعدادات العامة</div>

          <div class="mb-3">
            <label class="form-label fw-bold">DEFAULT_PHONE_NUMBER_ID</label>
            <input type="text" id="defaultPhoneNumberInput" class="form-control" placeholder="رقم الإرسال الافتراضي">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">اسم النظام</label>
            <input type="text" id="systemNameInput" class="form-control" placeholder="لوحة واتساب أعمال">
          </div>

          <button class="btn btn-primary" id="saveSettingsBtn">
            <i class="fa-regular fa-floppy-disk ms-1"></i>
            حفظ الإعدادات
          </button>
        </div>

        <div class="page-card">
          <div class="section-title">القيم الحالية</div>
          <div id="settingsWrap"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="guards.js"></script>
  <script src="settings-page.js"></script>
</body>
</html>
