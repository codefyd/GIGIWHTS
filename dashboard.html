<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | لوحة واتساب أعمال</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand app-brand" href="dashboard.html">
        <i class="fa-brands fa-whatsapp text-success ms-2"></i>
        لوحة واتساب أعمال
      </a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto sidebar-links">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="contacts.html">جهات الاتصال</a></li>
          <li class="nav-item"><a class="nav-link" href="conversations.html">المحادثات</a></li>
          <li class="nav-item"><a class="nav-link" href="templates.html">القوالب</a></li>
          <li class="nav-item"><a class="nav-link" href="webhook-logs.html">Webhook Logs</a></li>
          <li class="nav-item"><a class="nav-link" href="settings.html">الإعدادات</a></li>
        </ul>

        <div class="d-flex align-items-center gap-2">
          <span id="currentUserName" class="fw-bold text-muted"></span>
          <button class="btn btn-outline-danger btn-sm" id="logoutBtn">خروج</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="page-card mb-4">
        <h1 class="page-title">لوحة التحكم</h1>
        <p class="page-subtitle">نظرة سريعة على النشاط والرسائل والمحادثات</p>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6 col-xl-3">
          <div class="kpi-card">
            <div class="kpi-label">عدد المحادثات</div>
            <div class="kpi-value" id="kpiConversations">0</div>
            <div class="kpi-icon"><i class="fa-regular fa-comments"></i></div>
          </div>
        </div>

        <div class="col-md-6 col-xl-3">
          <div class="kpi-card">
            <div class="kpi-label">عدد جهات الاتصال</div>
            <div class="kpi-value" id="kpiContacts">0</div>
            <div class="kpi-icon"><i class="fa-regular fa-address-book"></i></div>
          </div>
        </div>

        <div class="col-md-6 col-xl-3">
          <div class="kpi-card">
            <div class="kpi-label">رسائل اليوم</div>
            <div class="kpi-value" id="kpiMessagesToday">0</div>
            <div class="kpi-icon"><i class="fa-regular fa-paper-plane"></i></div>
          </div>
        </div>

        <div class="col-md-6 col-xl-3">
          <div class="kpi-card">
            <div class="kpi-label">غير المقروءة</div>
            <div class="kpi-value" id="kpiUnreadMessages">0</div>
            <div class="kpi-icon"><i class="fa-regular fa-envelope-open"></i></div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="page-card">
            <div class="section-title">آخر الرسائل</div>
            <div id="latestMessages"></div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="page-card">
            <div class="section-title">آخر Webhooks</div>
            <div id="latestWebhooks"></div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="page-card">
            <div class="section-title">نشاط النظام</div>
            <div id="latestActivities"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="guards.js"></script>
  <script src="dashboard-page.js"></script>
</body>
</html>
