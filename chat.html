<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الدردشة | لوحة واتساب أعمال</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand app-brand" href="dashboard.html">لوحة واتساب أعمال</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto sidebar-links">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="contacts.html">جهات الاتصال</a></li>
          <li class="nav-item"><a class="nav-link active" href="conversations.html">المحادثات</a></li>
          <li class="nav-item"><a class="nav-link" href="templates.html">القوالب</a></li>
          <li class="nav-item"><a class="nav-link" href="webhook-logs.html">Webhook Logs</a></li>
          <li class="nav-item"><a class="nav-link" href="settings.html">الإعدادات</a></li>
        </ul>
        <button class="btn btn-outline-danger btn-sm" id="logoutBtn">خروج</button>
      </div>
    </div>
  </nav>

  <main class="app-shell">
    <div class="container">
      <div class="chat-layout">
        <aside class="chat-sidebar">
          <div class="p-3 border-bottom">
            <div class="fw-bold mb-2">قائمة المحادثات</div>
            <input type="text" id="sidebarSearchInput" class="form-control" placeholder="بحث سريع">
          </div>
          <div class="chat-list" id="chatSidebarList"></div>
        </aside>

        <section class="chat-main">
          <div class="chat-header">
            <div>
              <div class="fw-bold" id="chatContactName">اختر محادثة</div>
              <div class="small text-muted" id="chatContactMeta">—</div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
              <a href="conversations.html" class="btn btn-outline-primary btn-sm">العودة للمحادثات</a>
            </div>
          </div>

          <div class="chat-body" id="chatMessagesWrap">
            <div class="empty-state">اختر محادثة لعرض الرسائل</div>
          </div>

          <div class="chat-footer">
            <div class="row g-2 mb-2">
              <div class="col-md-8">
                <textarea id="messageInput" class="form-control" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
              </div>
              <div class="col-md-4 d-grid gap-2">
                <button class="btn btn-primary" id="sendTextBtn">
                  <i class="fa-regular fa-paper-plane ms-1"></i>
                  إرسال رسالة نصية
                </button>
                <button class="btn btn-outline-success" id="toggleTemplateBtn">
                  <i class="fa-regular fa-rectangle-list ms-1"></i>
                  قالب
                </button>
              </div>
            </div>

            <div class="row g-2" id="templateBox" style="display:none;">
              <div class="col-md-4">
                <label class="form-label fw-bold">اسم القالب</label>
                <input type="text" id="templateNameInput" class="form-control" placeholder="اسم القالب">
              </div>
              <div class="col-md-3">
                <label class="form-label fw-bold">اللغة</label>
                <input type="text" id="templateLanguageInput" class="form-control" value="ar">
              </div>
              <div class="col-md-5">
                <label class="form-label fw-bold">Components JSON</label>
                <input type="text" id="templateComponentsInput" class="form-control" placeholder='[]'>
              </div>
              <div class="col-12">
                <button class="btn btn-success" id="sendTemplateBtn">
                  <i class="fa-regular fa-paper-plane ms-1"></i>
                  إرسال القالب الآن
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="guards.js"></script>
  <script src="chat-page.js"></script>
</body>
</html>
