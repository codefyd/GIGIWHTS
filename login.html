<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | لوحة واتساب أعمال</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="app.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card text-center">
      <div class="login-logo mx-auto">
        <i class="fa-brands fa-whatsapp"></i>
      </div>

      <h1 class="page-title">لوحة واتساب أعمال</h1>
      <p class="page-subtitle mb-4">تسجيل الدخول إلى النظام</p>

      <form id="loginForm" class="text-end">
        <div class="mb-3">
          <label class="form-label fw-bold">البريد الإلكتروني</label>
          <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">كلمة المرور</label>
          <input type="password" class="form-control form-control-lg" id="password" placeholder="********" />
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100">
          <i class="fa-solid fa-right-to-bracket ms-1"></i>
          دخول
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script src="guards.js"></script>
  <script src="login-page.js"></script>
</body>
</html>
